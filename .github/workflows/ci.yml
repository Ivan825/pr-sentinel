name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prsentinel
          POSTGRES_PASSWORD: prsentinel
          POSTGRES_DB: prsentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prsentinel -d prsentinel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_NAME: PRSentinel
      APP_ENV: test
      APP_DEBUG: false
      DATABASE_URL: postgresql+psycopg2://prsentinel:prsentinel@localhost:5432/prsentinel
      GITHUB_AUTH_MODE: token
      GITHUB_TOKEN: ""
      GITHUB_APP_ID: ""
      GITHUB_APP_PRIVATE_KEY_PATH: ""
      GITHUB_APP_PRIVATE_KEY_BASE64: ""
      GITHUB_WEBHOOK_SECRET: ""
      LLM_PROVIDER: disabled
      LLM_API_KEY: ""
      LLM_MODEL: llama-3.1-8b-instant
      LLM_MAX_FINDINGS: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest

      - name: Run Ruff
        run: |
          ruff check .

      - name: Run mypy
        run: |
          mypy .