services:
  pr-sentinel-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pr-sentinel-api
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - >
        alembic upgrade head &&
        gunicorn apps.api.main:app
        -k uvicorn.workers.UvicornWorker
        --bind 0.0.0.0:8000
        --workers 2
        --timeout 120